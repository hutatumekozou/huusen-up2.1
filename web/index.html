<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>huusen-up</title>
    <meta name="description" content="huusen-up は、メモや学習内容を風船のように画面へ浮かべる macOS アプリです。">
    <style>
      :root {
        color-scheme: light;
        --ink: #18181b;
        --muted: #62646a;
        --line: #dedfe4;
        --paper: #fbfbfc;
        --blue: #1769e0;
        --rose: #e5486b;
        --amber: #f2a51a;
        --mint: #18a77b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        background: var(--paper);
        color: var(--ink);
      }

      main {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(320px, 0.95fr) minmax(360px, 1.05fr);
      }

      .intro {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 28px;
        padding: clamp(32px, 6vw, 86px);
        border-right: 1px solid var(--line);
        background: #fff;
      }

      .mark {
        width: 58px;
        height: 58px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 16px;
        font-size: 31px;
      }

      h1 {
        margin: 0;
        font-size: clamp(42px, 7vw, 84px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        max-width: 560px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(17px, 2vw, 21px);
        line-height: 1.75;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      a {
        color: inherit;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border: 1px solid var(--ink);
        border-radius: 8px;
        text-decoration: none;
        font-weight: 700;
      }

      .button.primary {
        background: var(--ink);
        color: #fff;
      }

      .stage {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.18)),
          repeating-linear-gradient(90deg, transparent 0 58px, rgba(0,0,0,0.035) 58px 59px),
          linear-gradient(150deg, #dff3ff 0%, #fff5da 52%, #f7e8ee 100%);
      }

      .toolbar {
        position: absolute;
        top: 24px;
        left: 24px;
        right: 24px;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px;
        border: 1px solid rgba(24, 24, 27, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(14px);
      }

      .toolbar strong {
        font-size: 15px;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
      }

      .balloon {
        position: absolute;
        bottom: -170px;
        width: 112px;
        height: 144px;
        display: grid;
        place-items: start center;
        animation: floatUp var(--duration) linear infinite;
        animation-delay: var(--delay);
      }

      .balloon::before {
        content: "";
        width: 96px;
        height: 96px;
        border-radius: 999px 999px 920px 920px;
        background: linear-gradient(135deg, var(--start), var(--end));
        box-shadow: 0 16px 30px rgba(24, 24, 27, 0.18);
      }

      .balloon::after {
        content: "";
        position: absolute;
        top: 96px;
        width: 1px;
        height: 48px;
        background: rgba(24, 24, 27, 0.35);
      }

      .balloon span {
        position: absolute;
        top: 31px;
        width: 78px;
        color: #fff;
        text-align: center;
        font-weight: 800;
        font-size: 15px;
        line-height: 1.25;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.28);
      }

      .b1 {
        left: 12%;
        --start: #4c8dff;
        --end: var(--blue);
        --duration: 14s;
        --delay: -8s;
      }

      .b2 {
        left: 42%;
        --start: #ff8da4;
        --end: var(--rose);
        --duration: 18s;
        --delay: -3s;
      }

      .b3 {
        left: 68%;
        --start: #ffcf6b;
        --end: var(--amber);
        --duration: 16s;
        --delay: -11s;
      }

      .b4 {
        left: 28%;
        --start: #5adbb6;
        --end: var(--mint);
        --duration: 20s;
        --delay: -14s;
      }

      .dock {
        position: absolute;
        left: 24px;
        right: 24px;
        bottom: 24px;
        z-index: 3;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .tile {
        min-height: 84px;
        padding: 14px;
        border: 1px solid rgba(24, 24, 27, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(14px);
      }

      .tile strong {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
      }

      .tile small {
        color: var(--muted);
        line-height: 1.45;
      }

      @keyframes floatUp {
        from {
          transform: translate3d(0, 0, 0) rotate(-2deg);
        }
        50% {
          transform: translate3d(24px, -52vh, 0) rotate(3deg);
        }
        to {
          transform: translate3d(-18px, -112vh, 0) rotate(-2deg);
        }
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
        }

        .intro {
          min-height: 48vh;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .stage {
          min-height: 52vh;
        }

        .dock {
          grid-template-columns: 1fr;
        }

        .tile {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="intro" aria-label="huusen-up">
        <div class="mark" aria-hidden="true">🎈</div>
        <div>
          <h1>huusen-up</h1>
          <p>メモ、復習項目、ひらめきをデスクトップへ静かに浮かべる macOS アプリ。Vercel では公開用の Web ページを配信し、アプリ本体は Mac 上で動作します。</p>
        </div>
        <div class="actions">
          <a class="button primary" href="https://github.com/hutatumekozou/huusen-up">GitHub</a>
          <a class="button" href="#preview">Preview</a>
        </div>
      </section>

      <section id="preview" class="stage" aria-label="風船プレビュー">
        <div class="toolbar">
          <strong>Balloon Overlay</strong>
          <span class="status">Web preview</span>
        </div>

        <div class="balloon b1"><span>英単語</span></div>
        <div class="balloon b2"><span>今日の確認</span></div>
        <div class="balloon b3"><span>アイデア</span></div>
        <div class="balloon b4"><span>復習</span></div>

        <div class="dock">
          <div class="tile">
            <strong>表示間隔</strong>
            <small>ローカルアプリ側で調整</small>
          </div>
          <div class="tile">
            <strong>カテゴリ管理</strong>
            <small>ジャンルごとに整理</small>
          </div>
          <div class="tile">
            <strong>画像とテキスト</strong>
            <small>風船ごとに登録</small>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
